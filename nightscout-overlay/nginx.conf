# HTTP op 1337 — blijft bestaan voor lokaal/debug (http://localhost:1337).
server {
  listen 1337;
  server_name _;

  gzip off;

  include /etc/nginx/overlay/app-locations.conf;
}

# HTTPS op 443 — voor de iOS-app en de PWA/service-worker op de telefoon.
# Cert via mkcert (lokaal vertrouwde CA); TLS termineert hier, intern blijft http.
server {
  listen 443 ssl;
  server_name _;

  gzip off;

  ssl_certificate     /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  include /etc/nginx/overlay/app-locations.conf;
}
