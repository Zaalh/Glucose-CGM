server {
  listen 1337;
  server_name _;

  gzip off;

  location = /_rate-overlay.js {
    alias /etc/nginx/overlay/rate-overlay.js;
    add_header Cache-Control "no-store";
  }

  location = /sw.js {
    alias /etc/nginx/overlay/sw.js;
    add_header Cache-Control "no-store";
  }

  location = /_overlay/entries {
    proxy_pass http://libreview-sync:8787/overlay/entries$is_args$args;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Host $host;
    add_header Cache-Control "no-store";
  }

  location = /_prediction/latest {
    proxy_pass http://libreview-sync:8787/prediction/latest;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Host $host;
    add_header Cache-Control "no-store";
  }

  location / {
    proxy_pass http://nightscout:1337;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header If-None-Match "";
    proxy_set_header If-Modified-Since "";
    proxy_set_header Accept-Encoding "";
    add_header Cache-Control "no-store";

    sub_filter_once on;
    sub_filter_types text/html;
    sub_filter '</body>' '<script src="/_rate-overlay.js?v=mobile7-1780103133"></script></body>';
  }
}
