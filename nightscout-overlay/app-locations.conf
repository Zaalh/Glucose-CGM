location = /_ai-review/events {
  # Lezen (GET) mag van iedereen op het LAN; schrijven (POST) alleen vanaf
  # private ranges + Tailscale + localhost. Defense-in-depth tegen exposure.
  limit_except GET {
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 100.64.0.0/10;
    allow 127.0.0.1;
    deny all;
  }
  proxy_pass http://libreview-sync:8787/ai-review/events$is_args$args;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  proxy_set_header Content-Type $http_content_type;
  add_header Cache-Control "no-store";
}

