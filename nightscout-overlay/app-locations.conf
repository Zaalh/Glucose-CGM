# Gedeelde locations voor zowel het http- (1337) als het https- (443) serverblok.
# Wordt geïnclude vanuit nginx.conf; pas overlay-routes hier op één plek aan.

location = /_rate-overlay.js {
  alias /etc/nginx/overlay/rate-overlay.js;
  add_header Cache-Control "no-store";
}

# mkcert root-CA aanbieden zodat iOS het via Safari als profiel kan installeren.
# Alleen het publieke CA-cert; nooit key.pem exposen.
location = /mkcert-rootCA.pem {
  alias /etc/nginx/certs/rootCA.pem;
  default_type application/x-x509-ca-cert;
  add_header Content-Disposition 'attachment; filename="mkcert-rootCA.pem"';
  add_header Cache-Control "no-store";
}

location = /sw.js {
  alias /etc/nginx/overlay/sw.js;
  add_header Cache-Control "no-store";
}

location = /_overlay/entries {
  proxy_pass http://libreview-sync:8787/overlay/entries$is_args$args;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  add_header Cache-Control "no-store";
}

location = /_prediction/latest {
  proxy_pass http://libreview-sync:8787/prediction/latest;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  add_header Cache-Control "no-store";
}

location = /_feedback {
  proxy_pass http://libreview-sync:8787/feedback;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  proxy_set_header Content-Type $http_content_type;
  add_header Cache-Control "no-store";
}

location = /_ai-review/run {
  proxy_pass http://libreview-sync:8787/ai-review/run;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  proxy_set_header Content-Type $http_content_type;
  # LLM-call kan tot ~1 min duren; ruimer dan de nginx-default van 60s.
  proxy_read_timeout 120s;
  add_header Cache-Control "no-store";
}

location = /_ai-review/latest {
  proxy_pass http://libreview-sync:8787/ai-review/latest$is_args$args;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  add_header Cache-Control "no-store";
}

location = /_ai-review/models {
  proxy_pass http://libreview-sync:8787/ai-review/models;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  add_header Cache-Control "no-store";
}

location / {
  proxy_pass http://nightscout:1337;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header If-None-Match "";
  proxy_set_header If-Modified-Since "";
  proxy_set_header Accept-Encoding "";
  add_header Cache-Control "no-store";

  sub_filter_once on;
  sub_filter_types text/html;
  sub_filter '</body>' '<script src="/_rate-overlay.js?v=ai-detail-20260611"></script></body>';
}
