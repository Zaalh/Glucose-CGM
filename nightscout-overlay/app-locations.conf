# Gedeelde locations voor zowel het http- (1337) als het https- (443) serverblok.
# Wordt geïnclude vanuit nginx.conf; pas overlay-routes hier op één plek aan.

location = /_rate-overlay.js {
  alias /etc/nginx/overlay/rate-overlay.js;
  add_header Cache-Control "no-store";
}

# mkcert root-CA aanbieden zodat iOS het via Safari als profiel kan installeren.
# Alleen het publieke CA-cert; nooit key.pem exposen.
location = /mkcert-rootCA.pem {
  alias /etc/nginx/certs/rootCA.pem;
  default_type application/x-x509-ca-cert;
  add_header Content-Disposition 'attachment; filename="mkcert-rootCA.pem"';
  add_header Cache-Control "no-store";
}

location = /sw.js {
  alias /etc/nginx/overlay/sw.js;
  add_header Cache-Control "no-store";
}

location = /_overlay/entries {
  proxy_pass http://libreview-sync:8787/overlay/entries$is_args$args;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  add_header Cache-Control "no-store";
}

location = /_prediction/latest {
  proxy_pass http://libreview-sync:8787/prediction/latest;
