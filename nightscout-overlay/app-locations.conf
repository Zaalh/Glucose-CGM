location = /_ai-review/run {
  # POST = nieuwe review draaien; GET ?id=<runId> = één opgeslagen run ophalen.
  proxy_pass http://libreview-sync:8787/ai-review/run$is_args$args;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  proxy_set_header Content-Type $http_content_type;
  # LLM-call kan tot ~1 min duren; ruimer dan de nginx-default van 60s.
  proxy_read_timeout 120s;
  add_header Cache-Control "no-store";
}

