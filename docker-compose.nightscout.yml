services:
  nightscout-mongo:
    image: mongo:4.4
    restart: unless-stopped
    volumes:
      - ./nightscout-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  nightscout:
    image: nightscout/cgm-remote-monitor:latest
    restart: unless-stopped
    depends_on:
      nightscout-mongo:
        condition: service_healthy
    env_file:
      - .env.nightscout
    environment:
      NODE_ENV: production
      PORT: 1337
      HOSTNAME: 0.0.0.0
      MONGODB_URI: mongodb://nightscout-mongo:27017/nightscout
      MONGO_CONNECTION: mongodb://nightscout-mongo:27017/nightscout
      INSECURE_USE_HTTP: "true"
      DISPLAY_UNITS: mmol
      AUTH_DEFAULT_ROLES: ${AUTH_DEFAULT_ROLES:-readable}
      ENABLE: ${ENABLE:-careportal rawbg iob cors}
      CUSTOM_TITLE: ${CUSTOM_TITLE:-Glucose CGM}
      THEME: ${THEME:-colors}
      TIME_FORMAT: ${TIME_FORMAT:-24}

  nightscout-ui:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      nightscout:
        condition: service_started
    volumes:
      - ./nightscout-overlay/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nightscout-overlay/rate-overlay.js:/etc/nginx/overlay/rate-overlay.js:ro
      - ./nightscout-overlay/sw.js:/etc/nginx/overlay/sw.js:ro
    ports:
      - "${NIGHTSCOUT_PORT:-1337}:1337"

  libreview-sync:
    image: node:20-alpine
    restart: unless-stopped
    profiles:
      - libre
    depends_on:
      nightscout:
        condition: service_started
    env_file:
      - .env.nightscout
      - .env.libreview
    environment:
      NIGHTSCOUT_URL: http://nightscout:1337
      LIBREVIEW_INTERVAL_SECONDS: ${LIBREVIEW_INTERVAL_SECONDS:-30}
      LIBREVIEW_TZ_OFFSET: ${LIBREVIEW_TZ_OFFSET:-120}
      LIBREVIEW_SYNC_PORT: 8787
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
    command: ["node", "scripts/libreview-nightscout-sync.mjs", "--server", "--loop"]
    ports:
      - "8787:8787"
